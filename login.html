<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CETIPass — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    .login-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 dark:from-slate-900 dark:to-slate-950 min-h-screen flex items-center justify-center p-4 transition-colors duration-500">

  <div class="login-card dark:bg-slate-900/80 w-full max-w-md p-8 rounded-3xl shadow-2xl text-center border dark:border-slate-800">
    <img src="logo.png" alt="Logo" class="h-20 w-auto mx-auto mb-6">
    
    <div id="loginView">
      <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white mb-2">CETIPass</h1>
      <p class="text-gray-600 dark:text-slate-400 mb-8">Acesso Administrativo</p>

      <form id="loginForm" class="space-y-4">
        <input type="email" id="emailLogin" required placeholder="E-mail" class="w-full px-5 py-3 rounded-xl border border-gray-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white">
        <input type="password" id="senhaLogin" required placeholder="Senha" class="w-full px-5 py-3 rounded-xl border border-gray-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white">
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all">Entrar</button>
      </form>
      <p class="mt-6 text-sm text-gray-600 dark:text-slate-400">Novo por aqui? <button onclick="toggleView()" class="text-indigo-600 font-bold hover:underline">Solicitar Acesso</button></p>
    </div>

    <div id="registerView" class="hidden">
      <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white mb-2">Solicitar Acesso</h1>
      <p class="text-gray-600 dark:text-slate-400 mb-8">Aguarde a aprovação da coordenação.</p>

      <form id="registerForm" class="space-y-4">
        <input type="text" id="nomeCadastro" required placeholder="Nome Completo" class="w-full px-5 py-3 rounded-xl border border-gray-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white">
        <input type="email" id="emailCadastro" required placeholder="E-mail Funcional" class="w-full px-5 py-3 rounded-xl border border-gray-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white">
        <input type="password" id="senhaCadastro" required placeholder="Crie uma Senha" class="w-full px-5 py-3 rounded-xl border border-gray-300 dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white">
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all">Enviar Solicitação</button>
      </form>
      <p class="mt-6 text-sm text-gray-600 dark:text-slate-400">Já tem conta? <button onclick="toggleView()" class="text-indigo-600 font-bold hover:underline">Voltar ao Login</button></p>
    </div>

    <div id="errorMessage" class="mt-6 text-red-600 font-medium hidden"></div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const loginView = document.getElementById('loginView');
    const registerView = document.getElementById('registerView');
    const errorEl = document.getElementById('errorMessage');

    window.toggleView = () => {
      loginView.classList.toggle('hidden');
      registerView.classList.toggle('hidden');
      errorEl.classList.add('hidden');
    };

    // Lógica de Solicitação de Acesso
    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const nome = document.getElementById('nomeCadastro').value.trim();
      const email = document.getElementById('emailCadastro').value.trim();
      const password = document.getElementById('senhaCadastro').value.trim();

      if (!nome || !email || !password) {
        errorEl.textContent = "Por favor, preencha todos os campos para solicitar acesso.";
        errorEl.classList.remove('hidden');
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = "A senha deve ter pelo menos 6 caracteres.";
        errorEl.classList.remove('hidden');
        return;
      }

      try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "usuarios", userCred.user.uid), {
          nome,
          email,
          status: 'pendente',
          role: 'funcionario',
          createdAt: new Date()
        });
        alert("Solicitação enviada. Aguarde a aprovação da coordenação.");
        await signOut(auth);
        location.reload();
      } catch (err) {
        errorEl.textContent = "Erro ao solicitar: " + err.message;
        errorEl.classList.remove('hidden');
      }
    };

    // Lógica de Login com Verificação de Status
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('emailLogin').value.trim();
      const password = document.getElementById('senhaLogin').value.trim();

      if (!email || !password) {
        errorEl.textContent = "Por favor, preencha e-mail e senha para entrar.";
        errorEl.classList.remove('hidden');
        return;
      }

      try {
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        const userDoc = await getDoc(doc(db, "usuarios", userCred.user.uid));
        
        if (!userDoc.exists()) {
          throw new Error("Usuário não registrado no Firestore.");
        }

        const userData = userDoc.data();
        if (userData.status === 'aprovado') {
          window.location.href = 'dashboard.html';
        } else if (userData.status === 'pendente') {
          await signOut(auth);
          throw new Error("Sua conta ainda aguarda aprovação.");
        } else {
          await signOut(auth);
          throw new Error("Seu acesso foi negado pela coordenação.");
        }
      } catch (err) {
        let userMessage = err.message;

        // Mapeamento de erros técnicos para mensagens amigáveis ao usuário
        if (err.code === 'auth/invalid-login-credentials' || err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
          userMessage = "E-mail ou senha incorretos. Por favor, verifique seus dados.";
        } else if (err.code === 'auth/too-many-requests') {
          userMessage = "Muitas tentativas malsucedidas. Sua conta foi temporariamente bloqueada.";
        }

        errorEl.textContent = userMessage;
        errorEl.classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
