<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CETIPass — Leitor QR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <style>
    .alert-success { background-color: #ecfdf5; color: #065f46; border: 2px solid #10b981; }
    .alert-error { background-color: #fee2e2; color: #991B1B; border: 2px solid #ef4444; }
    .alert-loading { background-color: #f3f4f6; color: #374151; border: 2px solid #9ca3af; }
    .big-touch { padding: 0.9rem 1.25rem; font-size: 1.125rem; }
    
    #reader { 
      min-height: 220px; 
      border-radius: 0.75rem; 
      overflow: hidden; 
      background: linear-gradient(135deg, #f8fafc, #f1f5f9); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      border: 2px dashed rgba(148, 163, 184, 0.4);
    }

    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    #reader canvas {
      display: none !important;
    }

    .nav-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-radius: 10rem;
      color: #fff !important;
      text-transform: uppercase;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1rem;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      z-index: 1;
      text-decoration: none;
      text-align: center;
      min-width: 110px;
    }
    .nav-button:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1e5aa0;
      z-index: -2;
    }
    .nav-button:before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0%;
      height: 100%;
      background-color: #f9b000;
      transition: all 0.3s;
      z-index: -1;
    }
    .nav-button:hover:before {
      width: 100%;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-gray-800 dark:text-gray-200 min-h-screen flex flex-col md:flex-row transition-colors duration-300">

  <!-- Menu Lateral -->
  <aside class="no-print w-full md:w-64 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 flex-shrink-0 flex flex-col h-auto md:h-screen sticky top-0">
    <div class="p-6 border-b border-gray-100 flex items-center gap-3">
      <img src="logo.png" alt="Logo" class="h-10 w-auto">
      <div>
        <h2 class="font-bold text-gray-900 dark:text-white leading-tight">CETIPass</h2>
        <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Gestão de Acesso</p>
      </div>
    </div>
    
    <nav class="flex-1 p-4 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 p-3 rounded-xl text-gray-600 dark:text-slate-400 hover:bg-indigo-50 dark:hover:bg-slate-800 hover:text-indigo-600 dark:hover:text-indigo-400 hover:translate-x-1 hover:scale-[1.02] transition-all duration-300 ease-in-out font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        Dashboard
      </a>
      <a href="leitor.html" class="flex items-center gap-3 p-3 rounded-xl bg-indigo-600 text-white shadow-lg shadow-indigo-100 hover:scale-[1.02] transition-all duration-300 ease-in-out font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3"/><path d="M7 12h3"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M12 16v.01"/><path d="M16 16v.01"/><path d="M21 12v.01"/><path d="M12 21v.01"/></svg>
        Leitor QR
      </a>
      <a href="listagem.html" class="flex items-center gap-3 p-3 rounded-xl text-gray-600 dark:text-slate-400 hover:bg-indigo-50 dark:hover:bg-slate-800 hover:text-indigo-600 dark:hover:text-indigo-400 hover:translate-x-1 hover:scale-[1.02] transition-all duration-300 ease-in-out font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
        Listagem
      </a>
      <a href="admin.html" class="flex items-center gap-3 p-3 rounded-xl text-gray-600 dark:text-slate-400 hover:bg-indigo-50 dark:hover:bg-slate-800 hover:text-indigo-600 dark:hover:text-indigo-400 hover:translate-x-1 hover:scale-[1.02] transition-all duration-300 ease-in-out font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="16" x2="22" y1="11" y2="11"/></svg>
        Cadastrar Aluno
      </a>
      <button id="themeToggle" class="w-full flex items-center gap-3 p-3 rounded-xl text-gray-600 dark:text-slate-400 hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="dark:hidden"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden dark:block"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg>
        Alternar Tema
      </button>
      <button id="logoutBtn" class="w-full flex items-center gap-3 p-3 rounded-xl text-red-500 hover:bg-red-50 transition-all font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        Sair
      </button>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col py-8 px-4 overflow-y-auto">
    <div class="w-full max-w-xl mx-auto my-auto">
      <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-lg p-4 sm:p-6 border dark:border-slate-800">
        <div class="flex flex-col sm:flex-row sm:gap-6">
          <!-- Leitor de QR Code -->
          <div class="flex-1">
            <label class="text-sm font-medium text-gray-700 dark:text-slate-300 mb-2 block">Leitor de QR Code</label>
            <div id="reader" class="rounded-xl dark:opacity-90"></div>
          </div>

          <!-- Controles Manuais -->
          <div class="w-full sm:w-80 mt-4 sm:mt-0 flex flex-col">
            <label class="text-sm font-medium text-gray-700 dark:text-slate-300 mb-2">Matrícula (digitar)</label>
            <div class="flex gap-2 mb-4">
              <input 
                id="matriculaInput" 
                type="text" 
                inputmode="numeric" 
                pattern="[0-9]*" 
                placeholder="Ex: 123456"
                class="flex-1 border border-gray-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white rounded-xl px-4 py-3 big-touch focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-transparent"
              />
              <button 
                id="confirmBtn" 
                class="bg-indigo-600 text-white rounded-xl px-5 py-3 big-touch hover:bg-indigo-700 active:bg-indigo-800 focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
              >
                Confirmar
              </button>
            </div>

            <div class="mt-2">
              <div 
                id="status" 
                class="hidden rounded-lg border px-4 py-3 text-center font-medium transition-all" 
                role="status"
              ></div>
            </div>

            <div class="mt-auto pt-4 text-xs text-gray-500">
              ℹ️ Permita o acesso à câmera quando solicitado
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center text-xs text-gray-400 py-4 md:py-6 border-t dark:border-slate-800 mt-auto">
      <p>&copy; 2026 CETIPass. Todos os direitos reservados.</p>
      <p class="mt-1 font-bold uppercase tracking-widest">Desenvolvido por Equipe de TI — CETI Nonato Valente</p>
    </footer>
  </main>

  <!-- Biblioteca html5-qrcode via Cloudflare (cdnjs) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    // Configuração do Firebase (Preencha os dados abaixo)
    const firebaseConfig = {
      apiKey: "AIzaSyB1wMxVNTcvIyz80arV4YNsKhUZAs7a4Uc",
      authDomain: "sistema-merenda.firebaseapp.com",
      projectId: "sistema-merenda",
      storageBucket: "sistema-merenda.firebasestorage.app",
      messagingSenderId: "1051054133501",
      appId: "1:1051054133501:web:83b869d971cc59a403ee94"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    if (location.protocol === "file:") {
      alert("Abra o projeto usando Live Server ou localhost. A câmera não funciona corretamente em arquivos locais.");
    }

    // ===== Referências de Elementos =====
    const statusEl = document.getElementById('status');
    const confirmBtn = document.getElementById('confirmBtn');
    const matriculaInput = document.getElementById('matriculaInput');
    const logoutBtn = document.getElementById('logoutBtn');
    const themeToggle = document.getElementById('themeToggle');
    const readerId = 'reader';

    // ===== Estado Global =====
    let scanningPaused = false;
    let scannerAtivo = false;
    let html5QrCode = null;
    let audioContext = null;
    let isScannerStarting = false;

    // Lógica de Alternar Tema
    themeToggle.addEventListener('click', () => {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    });

    // ===== Funções de UI =====
    function showStatus(type, message) {
      statusEl.className = 'rounded-lg border px-4 py-3 text-center font-medium flex items-center justify-between gap-3';
      statusEl.classList.remove('hidden');
      statusEl.classList.remove('alert-success', 'alert-error', 'alert-loading');
      if (type === 'sucesso') statusEl.classList.add('alert-success');
      else if (type === 'erro') statusEl.classList.add('alert-error');
      else if (type === 'carregando') statusEl.classList.add('alert-loading');
      
      statusEl.innerHTML = `<span>${message}</span>` + 
        (type !== 'carregando' ? `<button onclick="window.clearStatus()" class="p-1 hover:bg-black/10 rounded transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>` : '');
    }

    window.clearStatus = function() {
      statusEl.classList.add('hidden');
      statusEl.textContent = '';
    }

    // ===== Web Audio API para Bipes =====
    function playBeep(success = true) {
      try {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') audioContext.resume();
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.value = success ? 1000 : 200; // Tom grave para erro
        gain.gain.value = 0.08;
        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start();
        setTimeout(() => oscillator.stop(), success ? 180 : 250);
      } catch (e) { console.warn('Falha ao tocar beep:', e); }
    }

    // ===== Lógica Principal (Firestore) =====
    async function verificarAcesso(matricula) {
      if (!matricula || matricula.trim() === '' || scanningPaused) {
        showStatus('erro', 'Matrícula vazia');
        return;
      }

      scanningPaused = true;
      showStatus('carregando', 'Verificando...');

      try {
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

        // 1. Verifica se já existe registro hoje
        const qRegistro = query(
          collection(db, "registros"),
          where("matricula", "==", matricula),
          where("data", "==", todayStr),
          limit(1)
        );
        const snapshotRegistro = await getDocs(qRegistro);

        if (!snapshotRegistro.empty) {
          showStatus('erro', '✗ Refeição já realizada');
          playBeep(false);
        } else {
          // 2. Busca o nome do aluno
          const qAluno = query(
            collection(db, "alunos"),
            where("matricula", "==", matricula),
            limit(1)
          );
          const snapshotAluno = await getDocs(qAluno);

          if (snapshotAluno.empty) {
            showStatus('erro', '✗ Aluno não encontrado');
            playBeep(false);
          } else {
            const alunoData = snapshotAluno.docs[0].data();
            
            // 3. Grava o novo registro de refeição
            await addDoc(collection(db, "registros"), {
              matricula: matricula,
              data: todayStr,
              timestamp: serverTimestamp()
            });

            showStatus('sucesso', '✓ Liberado — ' + (alunoData.nome || 'Aluno'));
            playBeep(true);
            matriculaInput.value = '';
          }
        }
      } catch (erro) {
        console.error('Erro ao processar:', erro);
        showStatus('erro', '✗ Erro de banco de dados');
        playBeep(false);
      } finally {
        setTimeout(() => { // Pausa de 3 segundos antes de permitir nova leitura
          window.clearStatus();
          scanningPaused = false;
        }, 3000);
      }
    }

    // ===== Inicialização do Scanner =====
    async function initializeScanner() {
      if (isScannerStarting || scannerAtivo) return;
      isScannerStarting = true;
      try {
        if (html5QrCode) {
          try { if (scannerAtivo) await html5QrCode.stop(); await html5QrCode.clear(); } catch (e) {}
          html5QrCode = null;
          scannerAtivo = false;
        }
        html5QrCode = new Html5Qrcode(readerId);
        
        const config = { fps: 15, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 };

        await html5QrCode.start(
          { facingMode: "environment" }, // Força a câmara traseira
          config,
          (decodedText) => { if (!scanningPaused) verificarAcesso(decodedText); },
          () => {}
        );
        scannerAtivo = true;
        document.querySelectorAll("#reader canvas").forEach((c, i) => { if (i > 0) c.remove(); });
      } catch (err) {
        const errorMap = { 'NotAllowedError': 'Permissão negada.', 'NotFoundError': 'Câmera não encontrada.' };
        showStatus('erro', '✗ ' + (errorMap[err.name] || 'Erro ao carregar câmera.'));
      } finally { isScannerStarting = false; }
    }

    // ===== Event Listeners =====
    confirmBtn.addEventListener('click', (e) => { 
      e.preventDefault(); 
      verificarAcesso(matriculaInput.value.trim()); 
    });
    matriculaInput.addEventListener('keypress', (e) => { 
      if (e.key === 'Enter') { 
        e.preventDefault(); 
        verificarAcesso(matriculaInput.value.trim()); 
      } 
    });
    matriculaInput.addEventListener('input', () => clearStatus());

    // Proteção de rota e Logout
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      }
    });
    logoutBtn.addEventListener('click', async () => {
      await signOut(auth);
    });

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => initializeScanner());
    } else {
      initializeScanner();
    }
  </script>
</body>
