<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel Administrativo — Gerar QR Codes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { -webkit-font-smoothing:antialiased; scroll-behavior: smooth; }
    @media print {
      @page { size: A4 portrait; margin: 10mm; }
      .no-print { display: none !important; }
      body { background: #fff; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #cardWrapper { display: flex !important; box-shadow: none !important; margin: 0 !important; }
    }
    .modal-open { overflow: hidden; }
    .transition-modal { transition: opacity 0.3s ease, transform 0.3s ease; }
    
    .cracha-cr80 {
      width: 86mm !important; height: 54mm !important;
      min-width: 86mm !important; max-width: 86mm !important;
      min-height: 54mm !important; max-height: 54mm !important;
      background-color: white; border: 1px solid #94a3b8; border-radius: 8px;
      padding: 4mm; box-sizing: border-box; display: flex; flex-direction: row;
      justify-content: space-between; overflow: hidden; position: relative;
      page-break-inside: avoid;
    }
    .card-shadow { box-shadow: 0 10px 25px rgba(2, 6, 23, 0.08); }

    .loading-spinner {
      border: 2px solid #f3f3f3;
      border-top: 2px solid #4f46e5;
      border-radius: 50%;
      width: 16px; height: 16px;
      animation: spin 1s linear infinite;
    }
    .nav-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-radius: 10rem;
      color: #fff !important;
      text-transform: uppercase;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1rem;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      z-index: 1;
      text-decoration: none;
      text-align: center;
      min-width: 110px;
    }
    .nav-button:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1e5aa0;
      z-index: -2;
    }
    .nav-button:before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0%;
      height: 100%;
      background-color: #f9b000;
      transition: all 0.3s;
      z-index: -1;
    }
    .nav-button:hover:before {
      width: 100%;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="no-print bg-white border-b border-gray-200 sticky top-0 z-50 py-3 sm:py-4 shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 flex justify-between items-center">
      <div class="flex items-center gap-2 sm:gap-4">
        <img src="logo.jpeg" alt="Logo Escola" class="h-10 sm:h-14 w-auto object-contain">
        <div>
          <h1 class="text-lg sm:text-2xl font-extrabold text-gray-900 leading-tight">Painel Administrativo</h1>
          <p class="text-[10px] sm:text-sm font-medium text-gray-500">Gestão de Carteirinhas</p>
        </div>
      </div>
      <nav class="flex items-center gap-3 sm:gap-8">
        <a href="dashboard.html" class="text-sm sm:text-base font-bold text-gray-700 hover:text-indigo-600 transition-colors flex items-center gap-1 sm:gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 sm:w-5 sm:h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          <span>Voltar<span class="hidden sm:inline"> para o Dashboard</span></span>
        </a>
        <button id="openConfigBtn" class="p-2 sm:p-3 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all border border-gray-100 shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 sm:w-7 sm:h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="max-w-2xl mx-auto sm:px-4 py-8 sm:py-12">
    <!-- Reimprimir / Pesquisar -->
    <section class="mb-8 px-4 sm:px-0 no-print">
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-gray-400 group-focus-within:text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <input id="searchQuery" type="text" oninput="this.value = this.value.toUpperCase()" class="block w-full pl-11 pr-32 py-4 bg-white border border-gray-200 rounded-2xl leading-5 shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm uppercase transition-all" placeholder="PESQUISAR POR NOME OU MATRÍCULA PARA REIMPRIMIR">
        <div class="absolute inset-y-0 right-0 flex items-center pr-2">
          <button id="searchBtn" class="bg-gray-900 text-white px-6 py-2 rounded-xl text-sm font-bold hover:bg-black transition-all">Buscar</button>
        </div>
      </div>
    </section>

    <!-- Formulário de Cadastro -->
    <section class="bg-white sm:rounded-2xl p-5 sm:p-8 shadow-lg border-y sm:border border-gray-100 no-print">
      <div class="flex items-center gap-3 mb-8">
        <div class="p-2 bg-indigo-50 rounded-lg">
          <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
        </div>
        <h2 class="text-xl font-bold text-gray-800">Cadastrar Novo Aluno</h2>
      </div>
      
      <form id="formAluno" class="space-y-6" onsubmit="return false;">
        <!-- Nome Completo -->
        <div class="space-y-1">
          <label class="text-sm font-semibold text-gray-700">Nome do Aluno</label>
          <input id="nome" type="text" required oninput="this.value = this.value.toUpperCase()" class="w-full rounded-xl border-gray-200 bg-gray-50/50 p-4 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none border transition-all uppercase text-sm" placeholder="DIGITE O NOME COMPLETO">
          <p id="nomeWarning" class="text-xs text-red-500 mt-1 hidden font-medium">⚠️ Nome já consta na base de dados.</p>
        </div>

        <!-- Grid Curso e Turma -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-sm font-semibold text-gray-700">Curso</label>
            <select id="curso" required class="w-full rounded-xl border-gray-200 bg-gray-50/50 p-4 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none border transition-all text-sm">
              <option value="">Selecione...</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="text-sm font-semibold text-gray-700">Turma</label>
            <select id="turma" required class="w-full rounded-xl border-gray-200 bg-gray-50/50 p-4 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none border transition-all text-sm">
              <option value="">Selecione...</option>
            </select>
          </div>
        </div>

        <!-- Matrícula -->
        <div class="space-y-1">
          <label class="text-sm font-semibold text-gray-700">Matrícula de Identificação</label>
          <div class="flex gap-2">
            <input id="matricula" type="text" readonly class="flex-1 rounded-xl border-gray-200 bg-gray-100 p-4 font-mono font-bold text-gray-600 border text-sm" placeholder="0000000">
            <button id="refreshIdBtn" type="button" title="Gerar outro ID" class="p-4 bg-gray-100 text-gray-500 hover:bg-gray-200 rounded-xl transition-all">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
          </div>
        </div>

        <!-- Ações do Formulário -->
        <div class="flex flex-col-reverse sm:flex-row items-center justify-between pt-6 border-t border-gray-100 gap-4">
          <button id="limparBtn" type="button" class="text-gray-400 font-bold hover:text-gray-600 transition-colors uppercase text-xs tracking-widest">Limpar</button>
          <button id="gerarBtn" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg shadow-indigo-100 transition-all flex items-center justify-center gap-2">
            <span>Cadastrar e Gerar QR Code</span>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
          </button>
        </div>
      </form>
    </section>

    <!-- Preview da Carteirinha (Aparece após gerar) -->
    <section id="previewSection" class="mt-12 flex flex-col items-center hidden">
      <p class="text-xs font-bold text-gray-400 uppercase tracking-[0.2em] mb-4">Resultado da Geração</p>
      <div id="cardWrapper" class="cracha-cr80 shadow-2xl relative">
          <div class="w-[50mm] h-full flex flex-col justify-between overflow-hidden">
            <img src="logo.jpeg" class="h-[24mm] w-auto object-contain object-left mb-1">
            <div class="flex flex-col justify-end gap-[2px]">
              <span id="cardNome" class="font-bold text-[10px] leading-tight uppercase text-black break-words whitespace-normal line-clamp-2"></span>
              <span id="cardCurso" class="text-[8px] font-bold leading-tight uppercase text-indigo-700 break-words whitespace-normal line-clamp-2"></span>
              <span id="cardTurma" class="text-[8px] leading-tight uppercase text-gray-800"></span>
              <span id="cardMat" class="text-[8px] leading-tight uppercase text-gray-500 mt-1">ID: <span id="cardMatVal"></span></span>
            </div>
          </div>
          <div class="w-[26mm] h-[26mm] flex-shrink-0 flex items-start justify-center">
            <div id="qrcodeContainer" class="w-[26mm] h-[26mm]"></div>
          </div>
          <div class="absolute bottom-1 right-1 flex gap-1 no-print">
            <button id="imprimirBtn" class="bg-green-600 text-white rounded px-2 py-1 text-[10px] hover:bg-green-700">Imprimir</button>
            <button id="downloadBtn" class="bg-blue-600 text-white rounded px-2 py-1 text-[10px] hover:bg-blue-700">Baixar</button>
          </div>
      </div>
    </section>
  </main>

  <!-- Modal de Configurações Base -->
  <div id="configModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" id="closeConfigOverlay"></div>
    <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl relative z-10 overflow-hidden flex flex-col max-h-[90vh]">
      <div class="p-6 border-b flex justify-between items-center bg-gray-50/50">
        <h2 class="text-lg font-bold text-gray-800">Configurações de Cursos e Turmas</h2>
        <button id="closeConfigBtn" class="text-gray-400 hover:text-gray-600 p-2">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-6 space-y-8 overflow-y-auto">
          <!-- Gerenciar Cursos -->
          <div class="space-y-4">
            <p class="text-xs font-bold text-indigo-600 uppercase tracking-wider">Cursos</p>
            <div class="flex gap-2">
              <input id="newCurso" type="text" oninput="this.value = this.value.toUpperCase()" class="flex-1 rounded-xl border-gray-200 bg-gray-50 p-3 text-sm border outline-none focus:ring-2 focus:ring-indigo-500 uppercase" placeholder="NOME DO CURSO">
              <button id="addCursoBtn" class="bg-indigo-600 text-white px-4 rounded-xl font-bold">+</button>
            </div>
          </div>
          <!-- Gerenciar Turmas -->
          <div class="space-y-4">
            <p class="text-xs font-bold text-indigo-600 uppercase tracking-wider">Turmas por Curso</p>
            <select id="configCursoSelect" class="w-full rounded-xl border-gray-200 bg-gray-50 p-3 text-sm border outline-none focus:ring-2 focus:ring-indigo-500"></select>
            <div class="flex gap-2">
              <input id="newTurma" type="text" oninput="this.value = this.value.toUpperCase()" class="flex-1 rounded-xl border-gray-200 bg-gray-50 p-3 text-sm border outline-none focus:ring-2 focus:ring-indigo-500 uppercase" placeholder="NOME DA TURMA">
              <button id="addTurmaBtn" class="bg-indigo-600 text-white px-4 rounded-xl font-bold">+</button>
            </div>
          </div>
          <ul id="listCursosComTurmas" class="space-y-3 pt-4 border-t"></ul>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, limit, updateDoc, arrayUnion, arrayRemove, deleteField, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    // Configuração do Firebase (Preencha com suas chaves)
    const firebaseConfig = {
      apiKey: "AIzaSyB1wMxVNTcvIyz80arV4YNsKhUZAs7a4Uc",
      authDomain: "sistema-merenda.firebaseapp.com",
      projectId: "sistema-merenda",
      storageBucket: "sistema-merenda.firebasestorage.app",
      messagingSenderId: "1051054133501",
      appId: "1:1051054133501:web:83b869d971cc59a403ee94"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('formAluno');
    const nomeInput = document.getElementById('nome');
    const nomeWarning = document.getElementById('nomeWarning');
    const matriculaInput = document.getElementById('matricula');
    const cursoSelect = document.getElementById('curso');
    const turmaSelect = document.getElementById('turma');
    const gerarBtn = document.getElementById('gerarBtn');
    const limparBtn = document.getElementById('limparBtn');
    const searchBtn = document.getElementById('searchBtn');
    const searchQuery = document.getElementById('searchQuery');
    const configCursoSelect = document.getElementById('configCursoSelect');
    const newCursoInput = document.getElementById('newCurso');
    const newTurmaInput = document.getElementById('newTurma');
    const listCursosComTurmas = document.getElementById('listCursosComTurmas');

    // Lógica do Modal
    const configModal = document.getElementById('configModal');
    const openConfigBtn = document.getElementById('openConfigBtn');
    const closeConfigBtn = document.getElementById('closeConfigBtn');
    const closeConfigOverlay = document.getElementById('closeConfigOverlay');
    const refreshIdBtn = document.getElementById('refreshIdBtn');
    const previewSection = document.getElementById('previewSection');

    const toggleModal = (show) => {
      if(show) {
        configModal.classList.remove('hidden');
        configModal.classList.add('flex');
        document.body.classList.add('modal-open');
      } else {
        configModal.classList.add('hidden');
        configModal.classList.remove('flex');
        document.body.classList.remove('modal-open');
      }
    };

    openConfigBtn.onclick = () => toggleModal(true);
    closeConfigBtn.onclick = () => toggleModal(false);
    closeConfigOverlay.onclick = () => toggleModal(false);
    refreshIdBtn.onclick = () => {
      matriculaInput.value = generateMatricula();
    };

    let cursosComTurmas = {};

    const cardWrapper = document.getElementById('cardWrapper');
    const qrcodeContainer = document.getElementById('qrcodeContainer');
    const cardNome = document.getElementById('cardNome');
    const cardCurso = document.getElementById('cardCurso');
    const cardTurma = document.getElementById('cardTurma');
    const cardMatVal = document.getElementById('cardMatVal');
    const imprimirBtn = document.getElementById('imprimirBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    // Verificação de nome em tempo real com debounce
    let debounceTimer;
    nomeInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const nome = nomeInput.value.trim();
      nomeWarning.classList.add('hidden');

      if (nome.length < 3) return;

      debounceTimer = setTimeout(async () => {
        try {
          const q = query(
            collection(db, "alunos"), 
            where("nome", "==", nome), 
            limit(1)
          );
          const snap = await getDocs(q);
          if (!snap.empty) {
            nomeWarning.classList.remove('hidden');
          }
        } catch (e) {
          console.error("Erro ao verificar nome:", e);
        }
      }, 600); // Aguarda 600ms após a última tecla
    });

    // --- Gestão de Configurações (Cursos/Turmas) ---
    const configDocRef = doc(db, "configuracoes", "dadosBase");

    function setupConfigSync() {
      onSnapshot(configDocRef, async (docSnap) => {
        if (docSnap.exists()) {
          const data = docSnap.data();
          cursosComTurmas = data.cursosComTurmas || {};

          if (!data.cursosComTurmas) {
            const oldCourses = Array.isArray(data.cursos) ? data.cursos : [];
            oldCourses.forEach(curso => {
              if (!cursosComTurmas[curso]) cursosComTurmas[curso] = [];
            });

            if (oldCourses.length) {
              await setDoc(configDocRef, { cursosComTurmas }, { merge: true });
            }
          }

          const cursos = Object.keys(cursosComTurmas).sort((a, b) => a.localeCompare(b, 'pt-BR'));
          populateCourseSelect(cursoSelect, cursos, "Selecione um curso");
          populateCourseSelect(configCursoSelect, cursos, "Selecione um curso");
          renderConfigList(cursosComTurmas);
          handleCursoSelectChange();
        } else {
          await setDoc(configDocRef, { cursosComTurmas: {} });
        }
      });
    }

    function populateCourseSelect(selectEl, cursos, placeholder) {
      selectEl.innerHTML = `<option value="">${placeholder}</option>`;
      cursos.forEach(curso => {
        const opt = document.createElement('option');
        opt.value = curso;
        opt.textContent = curso;
        selectEl.appendChild(opt);
      });
    }

    function populateTurmaSelect(selectEl, turmas, placeholder, disabled = false) {
      selectEl.innerHTML = `<option value="">${placeholder}</option>`;
      turmas.forEach(turma => {
        const opt = document.createElement('option');
        opt.value = turma;
        opt.textContent = turma;
        selectEl.appendChild(opt);
      });
      selectEl.disabled = disabled;
    }

    function renderConfigList(cursosComTurmasData) {
      listCursosComTurmas.innerHTML = '';
      const cursos = Object.keys(cursosComTurmasData).sort((a, b) => a.localeCompare(b, 'pt-BR'));

      if (!cursos.length) {
        const emptyItem = document.createElement('li');
        emptyItem.className = 'text-sm text-gray-500';
        emptyItem.textContent = 'Nenhum curso cadastrado.';
        listCursosComTurmas.appendChild(emptyItem);
        return;
      }

      cursos.forEach(curso => {
        const turmas = Array.isArray(cursosComTurmasData[curso]) ? cursosComTurmasData[curso].sort((a, b) => a.localeCompare(b, 'pt-BR')) : [];
        const cursoItem = document.createElement('li');
        cursoItem.className = 'space-y-2 border border-gray-100 rounded-lg p-3';

        const header = document.createElement('div');
        header.className = 'flex items-center justify-between gap-2';

        const title = document.createElement('span');
        title.className = 'font-semibold text-gray-800';
        title.textContent = curso;

        const deleteCursoBtn = document.createElement('button');
        deleteCursoBtn.className = 'text-red-500 hover:text-red-700 text-xs font-medium';
        deleteCursoBtn.textContent = 'Excluir curso';
        deleteCursoBtn.onclick = () => window.removeConfig('curso', curso);

        header.appendChild(title);
        header.appendChild(deleteCursoBtn);
        cursoItem.appendChild(header);

        if (turmas.length) {
          const turmaList = document.createElement('ul');
          turmaList.className = 'space-y-2 mt-3';

          turmas.forEach(turma => {
            const turmaItem = document.createElement('li');
            turmaItem.className = 'flex items-center justify-between gap-2 bg-gray-50 rounded p-2';

            const turmaLabel = document.createElement('span');
            turmaLabel.textContent = turma;

            const deleteTurmaBtn = document.createElement('button');
            deleteTurmaBtn.className = 'text-red-500 hover:text-red-700 text-xs';
            deleteTurmaBtn.textContent = 'Excluir turma';
            deleteTurmaBtn.onclick = () => window.removeConfig('turma', curso, turma);

            turmaItem.appendChild(turmaLabel);
            turmaItem.appendChild(deleteTurmaBtn);
            turmaList.appendChild(turmaItem);
          });

          cursoItem.appendChild(turmaList);
        } else {
          const emptyState = document.createElement('p');
          emptyState.className = 'text-xs text-gray-500 mt-2';
          emptyState.textContent = 'Nenhuma turma cadastrada para este curso.';
          cursoItem.appendChild(emptyState);
        }

        listCursosComTurmas.appendChild(cursoItem);
      });
    }

    window.removeConfig = async (type, curso, turma) => {
      if (type === 'curso') {
        if (!confirm(`Excluir o curso "${curso}" e todas as suas turmas?`)) return;
        await updateDoc(configDocRef, { [`cursosComTurmas.${curso}`]: deleteField() });
      } else if (type === 'turma') {
        if (!confirm(`Excluir a turma "${turma}" do curso "${curso}"?`)) return;
        await updateDoc(configDocRef, { [`cursosComTurmas.${curso}`]: arrayRemove(turma) });
      }
    };

    document.getElementById('addCursoBtn').onclick = async () => {
      const val = newCursoInput.value.trim().toUpperCase();
      if (!val) return;
      await updateDoc(configDocRef, { [`cursosComTurmas.${val}`]: [] });
      newCursoInput.value = '';
      configCursoSelect.value = val;
    };

    document.getElementById('addTurmaBtn').onclick = async () => {
      const cursoSelecionado = configCursoSelect.value;
      const val = newTurmaInput.value.trim().toUpperCase();
      if (!cursoSelecionado) {
        alert('Selecione um curso antes de adicionar a turma.');
        return;
      }
      if (!val) return;
      await updateDoc(configDocRef, { [`cursosComTurmas.${cursoSelecionado}`]: arrayUnion(val) });
      newTurmaInput.value = '';
    };

    function handleCursoSelectChange() {
      const curso = cursoSelect.value;
      if (!curso) {
        populateTurmaSelect(turmaSelect, [], "Selecione um curso primeiro", true);
        return;
      }
      const turmas = cursosComTurmas[curso] || [];
      populateTurmaSelect(turmaSelect, turmas, "Selecione uma turma", turmas.length === 0);
    }

    cursoSelect.addEventListener('change', handleCursoSelectChange);
    configCursoSelect.addEventListener('change', () => {
      newTurmaInput.focus();
    });

    // Gera matrícula aleatória de 7 dígitos
    function generateMatricula() {
      return Math.floor(1000000 + Math.random() * 9000000).toString();
    }

    // Inicializa matrícula no load
    window.addEventListener('DOMContentLoaded', () => {
      matriculaInput.value = generateMatricula();
      setupConfigSync();
    });

    // Função para salvar no Firestore
    async function salvarNoFirestore(nome, matricula, curso, turma) {
      try {
        // Usando a matrícula como ID do documento
        await setDoc(doc(db, "alunos", matricula), {
          nome: nome.toUpperCase(),
          matricula: matricula,
          curso: curso.toUpperCase(),
          turma: turma.toUpperCase(),
          status: 'ativo'
        });
        console.log("Aluno cadastrado no Firestore com sucesso!");
        return true;
      } catch (error) {
        console.error("Erro ao salvar no Firestore:", error);
        alert("Erro ao salvar no banco de dados. Verifique o console.");
        return false;
      }
    }

    function gerarCarteirinha(nome, matricula, curso, turma) {
      // Renderizar QR Code usando a biblioteca qrcode.js
      qrcodeContainer.innerHTML = ""; // Limpa anterior
      new QRCode(qrcodeContainer, {
        text: matricula,
        width: 85,
        height: 85,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });

      cardNome.textContent = nome;
      cardCurso.textContent = curso;
      cardTurma.textContent = turma;
      cardMatVal.textContent = matricula;

      previewSection.classList.remove('hidden');
    }

    gerarBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      const nome = nomeInput.value.trim();
      const curso = cursoSelect.value;
      const turma = turmaSelect.value;
      const matricula = matriculaInput.value;
      
      if (!nome || !curso || !turma) {
        alert('Preencha todos os campos.');
        return;
      }

      const originalText = gerarBtn.textContent;
      gerarBtn.disabled = true;
      gerarBtn.textContent = "Salvando...";
      
      const salvo = await salvarNoFirestore(nome, matricula, curso, turma);
      
      if (salvo) {
        gerarCarteirinha(nome, matricula, curso, turma);
        // Prepara para um novo cadastro se necessário
        nomeInput.value = '';
        cursoSelect.value = '';
        turmaSelect.value = '';
        matriculaInput.value = generateMatricula();
      }

      gerarBtn.disabled = false;
      gerarBtn.textContent = originalText;
    });

    // Função de Pesquisar Aluno
    searchBtn.addEventListener('click', async () => {
      const val = searchQuery.value.trim().toUpperCase();
      if (!val) return;

      searchBtn.disabled = true;
      try {
        let aluno = null;

        // 1. Tentar busca pelo ID (matrícula)
        const docRef = doc(db, "alunos", val);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          aluno = docSnap.data();
        } else {
          // 2. Se não achar por ID, tentar busca pelo campo nome
          const q = query(collection(db, "alunos"), where("nome", "==", val));
          const querySnapshot = await getDocs(q);
          if (!querySnapshot.empty) {
            aluno = querySnapshot.docs[0].data();
          }
        }

        if (aluno) {
          gerarCarteirinha(aluno.nome, aluno.matricula, aluno.curso, aluno.turma);
        } else {
          alert("Aluno não encontrado.");
        }
      } catch (e) {
        console.error("Erro na busca:", e);
      } finally {
        searchBtn.disabled = false;
      }
    });

    limparBtn.addEventListener('click', () => {
      form.reset();
      previewSection.classList.add('hidden');
      nomeWarning.classList.add('hidden');
      matriculaInput.value = generateMatricula();
    });

    imprimirBtn.addEventListener('click', () => window.print());

    downloadBtn.addEventListener('click', async () => {
      const canvas = qrcodeContainer.querySelector('canvas');
      if (!canvas) return;

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [86, 54] });

      const nome = cardNome.textContent.trim();
      const curso = cardCurso.textContent.trim();
      const turma = cardTurma.textContent.trim();
      const matricula = cardMatVal.textContent.trim();
      const qrDataUrl = canvas.toDataURL("image/png");

      // Borda opcional (remova se preferir o cartão limpo)
      pdf.setDrawColor(203, 213, 225); // #cbd5e1
      pdf.setLineWidth(0.1);
      pdf.roundedRect(0, 0, 86, 54, 2, 2);

      // Logo (Margem 4mm)
      pdf.addImage('logo.jpeg', 'JPEG', 4, 4, 24, 24);
      
      // QR Code (Posicionado à direita: 86 - 4 (margem) - 26 (largura) = 56mm)
      pdf.addImage(qrDataUrl, 'PNG', 56, 4, 26, 26);

      // Coluna de Texto (Largura máx 50mm para não invadir o QR)
      let currentY = 31; 
      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(10);
      pdf.setTextColor(0, 0, 0);
      const nomeLines = pdf.splitTextToSize(nome.toUpperCase(), 50);
      pdf.text(nomeLines, 4, currentY);
      currentY += (nomeLines.length * 4);

      pdf.setFontSize(8);
      pdf.setTextColor(67, 56, 202);
      const cursoLines = pdf.splitTextToSize(curso.toUpperCase(), 50);
      pdf.text(cursoLines, 4, currentY);
      currentY += (cursoLines.length * 3);

      pdf.setFont("helvetica", "normal");
      pdf.setTextColor(31, 41, 55);
      pdf.text(turma.toUpperCase(), 4, currentY);
      currentY += 4;

      pdf.setTextColor(107, 114, 128);
      pdf.text("ID: " + matricula, 4, currentY);

      const fileName = `${nome.toUpperCase()} - ${matricula}.pdf`;
      pdf.save(fileName);
    });
  </script>
</body>
</html>
