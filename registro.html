<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CETIPass — Criar Conta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-600 to-indigo-500 dark:from-slate-900 dark:to-slate-950 min-h-screen flex items-center justify-center p-4 transition-colors duration-500">

  <div class="login-card dark:bg-slate-900/80 w-full max-w-md p-8 rounded-3xl shadow-2xl text-center border dark:border-slate-800">
    <img src="logo.png" alt="Logo Escola" class="h-20 w-auto mx-auto mb-6">
    <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white mb-2">Novo Cadastro</h1>
    <p class="text-gray-600 dark:text-slate-400 mb-8">Crie uma conta para gerenciar o sistema.</p>

    <form id="registerForm" class="space-y-4">
      <div>
        <input type="email" id="email" required placeholder="E-mail" 
          class="w-full px-5 py-3 rounded-xl border border-gray-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
      </div>
      <div>
        <input type="password" id="password" required placeholder="Senha (mín. 6 caracteres)" 
          class="w-full px-5 py-3 rounded-xl border border-gray-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
      </div>
      <div>
        <input type="password" id="confirmPassword" required placeholder="Confirme a senha" 
          class="w-full px-5 py-3 rounded-xl border border-gray-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
      </div>
      
      <button type="submit" id="registerBtn" 
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all">
        Cadastrar
      </button>
    </form>

    <div id="errorMessage" class="mt-6 text-red-600 font-medium hidden"></div>
    
    <p class="mt-8 text-sm text-gray-600 dark:text-slate-400">
      Já tem uma conta? <a href="login.html" class="text-indigo-600 font-bold hover:underline">Faça login</a>
    </p>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const registerForm = document.getElementById('registerForm');
    const errorMessage = document.getElementById('errorMessage');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const registerBtn = document.getElementById('registerBtn');

      if (password !== confirmPassword) {
        errorMessage.textContent = 'As senhas não coincidem.';
        errorMessage.classList.remove('hidden');
        return;
      }

      if (password.length < 6) {
        errorMessage.textContent = 'A senha deve ter pelo menos 6 caracteres.';
        errorMessage.classList.remove('hidden');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.textContent = 'Processando...';
      errorMessage.classList.add('hidden');

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Criar perfil do usuário no Firestore com status pendente e papel inicial limitado
        await setDoc(doc(db, "usuarios", user.uid), {
          email: email,
          role: 'viewer',    
          status: 'pending',  
          createdAt: serverTimestamp()
        });

        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error("Erro no registro:", error);
        let msg = 'Erro ao criar conta.';
        if (error.code === 'auth/email-already-in-use') msg = 'Este e-mail já está em uso.';
        if (error.code === 'auth/invalid-email') msg = 'E-mail inválido.';
        
        errorMessage.textContent = msg;
        errorMessage.classList.remove('hidden');
        registerBtn.disabled = false;
        registerBtn.textContent = 'Cadastrar';
      }
    });
  </script>
</body>
</html>
