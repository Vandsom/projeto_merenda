<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Autoatendimento — CETI NONATO VALENTE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { -webkit-font-smoothing: antialiased; }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .carousel-img {
      transition: opacity 1.5s ease-in-out;
    }
    /* Ocultar scrollbar mantendo funcionalidade */
    ::-webkit-scrollbar { display: none; }
    
    /* Padrão CR80 para o preview interno se necessário */
    .cracha-preview {
      width: 86mm; height: 54mm;
      background: white; border-radius: 8px;
      padding: 4mm; display: flex; justify-content: space-between;
      position: relative; overflow: hidden;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col font-sans overflow-x-hidden">

  <!-- Carrossel de Fundo -->
  <div id="bg-carousel" class="fixed inset-0 z-[-1] bg-gray-900">
    <img src="img/foto1.jpg" class="carousel-img absolute inset-0 w-full h-full object-cover opacity-100">
    <img src="img/foto2.jpg" class="carousel-img absolute inset-0 w-full h-full object-cover opacity-0">
    <img src="img/foto3.jpg" class="carousel-img absolute inset-0 w-full h-full object-cover opacity-0">
    <img src="img/foto4.jpg" class="carousel-img absolute inset-0 w-full h-full object-cover opacity-0">
    <img src="img/foto5.jpg" class="carousel-img absolute inset-0 w-full h-full object-cover opacity-0">
    <img src="img/foto6.jpg" class="carousel-img absolute inset-0 w-full h-full object-cover opacity-0">
  </div>

  <header class="p-6 flex items-center justify-between w-full max-w-5xl mx-auto">
    <div class="flex items-center gap-4">
      <img src="logo.jpeg" alt="Logo" class="h-16 w-auto drop-shadow-lg">
      <div>
        <h1 class="text-white text-2xl font-black tracking-tighter drop-shadow-md">CETI NONATO VALENTE</h1>
        <p class="text-indigo-100 text-xs font-bold uppercase tracking-widest">Autoatendimento Escolar</p>
      </div>
    </div>
    <a href="dashboard.html" class="text-white/80 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
  </header>

  <main class="flex-1 flex items-center justify-center p-4">
    <!-- Seção de Formulário -->
    <section id="form-section" class="glass-card w-full max-w-lg rounded-3xl p-8 shadow-2xl transition-all duration-500">
      <div class="mb-8">
        <h2 class="text-2xl font-extrabold text-gray-900">Solicitar Carteirinha</h2>
        <p class="text-gray-500 text-sm">Preencha os seus dados para gerar o documento.</p>
      </div>

      <form id="studentForm" class="space-y-5" onsubmit="return false;">
        <div class="space-y-1">
          <label class="text-xs font-bold text-gray-700 uppercase tracking-wider pl-1">Nome Completo</label>
          <input id="nome" type="text" required oninput="this.value = this.value.toUpperCase()" 
            class="w-full rounded-2xl border-none bg-white/50 p-4 focus:bg-white focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all text-sm font-semibold" 
            placeholder="DIGITE SEU NOME COMO NO DOCUMENTO">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-700 uppercase tracking-wider pl-1">Curso</label>
            <select id="curso" required 
              class="w-full rounded-2xl border-none bg-white/50 p-4 focus:bg-white focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all text-sm font-semibold appearance-none">
              <option value="">SELECIONE...</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-700 uppercase tracking-wider pl-1">Turma</label>
            <select id="turma" required disabled
              class="w-full rounded-2xl border-none bg-white/50 p-4 focus:bg-white focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all text-sm font-semibold appearance-none">
              <option value="">AGUARDANDO...</option>
            </select>
          </div>
        </div>

        <button id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-200 transition-all flex items-center justify-center gap-3 group uppercase tracking-tighter">
          <span>Cadastrar e Gerar Agora</span>
          <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        </button>
      </form>
    </section>

    <!-- Seção de Sucesso -->
    <section id="success-section" class="glass-card w-full max-w-lg rounded-3xl p-10 shadow-2xl hidden flex-col items-center text-center animate-in fade-in zoom-in duration-500">
      <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h2 class="text-3xl font-black text-gray-900 mb-2">Sucesso!</h2>
      <p class="text-gray-600 mb-8">Sua matrícula foi gerada com sucesso. Você já pode baixar sua carteirinha digital abaixo.</p>
      
      <!-- QR Code Oculto (apenas para o PDF) -->
      <div id="qrcode-hidden" class="hidden"></div>

      <div class="space-y-3 w-full">
        <button id="downloadPdfBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          Baixar Carteirinha (PDF)
        </button>
        <button onclick="window.location.reload()" class="w-full bg-white/50 text-gray-500 font-bold py-4 rounded-2xl hover:bg-white transition-all">
          Novo Cadastro
        </button>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDocs, query, where, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB1wMxVNTcvIyz80arV4YNsKhUZAs7a4Uc",
      authDomain: "sistema-merenda.firebaseapp.com",
      projectId: "sistema-merenda",
      storageBucket: "sistema-merenda.firebasestorage.app",
      messagingSenderId: "1051054133501",
      appId: "1:1051054133501:web:83b869d971cc59a403ee94"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Elementos da UI
    const formSection = document.getElementById('form-section');
    const successSection = document.getElementById('success-section');
    const studentForm = document.getElementById('studentForm');
    const nomeInput = document.getElementById('nome');
    const cursoSelect = document.getElementById('curso');
    const turmaSelect = document.getElementById('turma');
    const submitBtn = document.getElementById('submitBtn');
    const downloadPdfBtn = document.getElementById('downloadPdfBtn');

    let cursosComTurmas = {};
    let alunoAtual = null;

    // 1. Lógica do Carrossel de Fundo
    const imgs = document.querySelectorAll('.carousel-img');
    let currentImgIdx = 0;
    setInterval(() => {
      imgs[currentImgIdx].classList.replace('opacity-100', 'opacity-0');
      currentImgIdx = (currentImgIdx + 1) % imgs.length;
      imgs[currentImgIdx].classList.replace('opacity-0', 'opacity-100');
    }, 5000);

    // 2. Sincronização de Cursos e Turmas (Firebase)
    const configDocRef = doc(db, "configuracoes", "dadosBase");
    onSnapshot(configDocRef, (docSnap) => {
      if (docSnap.exists()) {
        cursosComTurmas = docSnap.data().cursosComTurmas || {};
        const cursos = Object.keys(cursosComTurmas).sort();
        
        cursoSelect.innerHTML = '<option value="">SELECIONE O CURSO</option>';
        cursos.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c;
          cursoSelect.appendChild(opt);
        });
      }
    });

    cursoSelect.addEventListener('change', () => {
      const curso = cursoSelect.value;
      if (!curso) {
        turmaSelect.innerHTML = '<option value="">AGUARDANDO...</option>';
        turmaSelect.disabled = true;
        return;
      }
      const turmas = cursosComTurmas[curso] || [];
      turmaSelect.innerHTML = '<option value="">SELECIONE A TURMA</option>';
      turmas.sort().forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        turmaSelect.appendChild(opt);
      });
      turmaSelect.disabled = false;
    });

    // 3. Submissão e Verificação de Duplicidade
    submitBtn.addEventListener('click', async () => {
      const nomeVal = nomeInput.value.trim().toUpperCase();
      const cursoVal = cursoSelect.value;
      const turmaVal = turmaSelect.value;

      if (!nomeVal || !cursoVal || !turmaVal) {
        alert("Por favor, preencha todos os campos.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span>Processando...</span>`;

      try {
        // Verificação de duplicidade
        const q = query(collection(db, "alunos"), where("nome", "==", nomeVal), limit(1));
        const snap = await getDocs(q);

        if (!snap.empty) {
          alert("Atenção: Já existe um aluno cadastrado com este nome exato.");
          submitBtn.disabled = false;
          submitBtn.innerHTML = `<span>Cadastrar e Gerar Agora</span>`;
          return;
        }

        // Gerar Matrícula (7 dígitos)
        const matricula = Math.floor(1000000 + Math.random() * 9000000).toString();
        
        alunoAtual = {
          nome: nomeVal,
          matricula: matricula,
          curso: cursoVal,
          turma: turmaVal,
          status: 'ativo'
        };

        // Salvar no Firestore
        await setDoc(doc(db, "alunos", matricula), alunoAtual);

        // UI Success
        formSection.classList.add('hidden');
        successSection.classList.remove('hidden');
        successSection.classList.add('flex');

      } catch (error) {
        console.error(error);
        alert("Erro ao realizar cadastro.");
        submitBtn.disabled = false;
      }
    });

    // 4. Geração da Carteirinha PDF (jsPDF + CR80)
    downloadPdfBtn.addEventListener('click', () => {
      if (!alunoAtual) return;

      // Gerar QR Code em container temporário
      const qrDiv = document.getElementById('qrcode-hidden');
      qrDiv.innerHTML = "";
      new QRCode(qrDiv, {
        text: alunoAtual.matricula,
        width: 100,
        height: 100,
        correctLevel: QRCode.CorrectLevel.H
      });

      // Pequeno timeout para garantir que o canvas do QR foi gerado
      setTimeout(() => {
        const canvas = qrDiv.querySelector('canvas');
        const qrDataUrl = canvas.toDataURL("image/png");

        const { jsPDF } = window.jspdf;
        // CR80: 86mm x 54mm
        const pdf = new jsPDF({
          orientation: 'landscape',
          unit: 'mm',
          format: [86, 54]
        });

        // Configurações Estéticas do PDF (Blindado)
        // Borda do cartão
        pdf.setDrawColor(203, 213, 225);
        pdf.setLineWidth(0.1);
        pdf.roundedRect(0, 0, 86, 54, 2, 2);

        // Logo da Escola (24mm x 24mm)
        pdf.addImage('logo.jpeg', 'JPEG', 4, 4, 24, 24);

        // QR Code (26mm x 26mm)
        pdf.addImage(qrDataUrl, 'PNG', 56, 4, 26, 26);

        // Dados do Aluno (Início em Y=31)
        let currentY = 31;

        // Nome (Negrito, Quebra de linha se necessário)
        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(10);
        pdf.setTextColor(0, 0, 0);
        const nomeLines = pdf.splitTextToSize(alunoAtual.nome, 50);
        pdf.text(nomeLines, 4, currentY);
        currentY += (nomeLines.length * 4);

        // Curso (Azul Indigo)
        pdf.setFontSize(8);
        pdf.setTextColor(67, 56, 202);
        const cursoLines = pdf.splitTextToSize(alunoAtual.curso, 50);
        pdf.text(cursoLines, 4, currentY);
        currentY += (cursoLines.length * 3.5);

        // Turma
        pdf.setFont("helvetica", "normal");
        pdf.setTextColor(31, 41, 55);
        pdf.text(alunoAtual.turma, 4, currentY);
        currentY += 4.5;

        // Matrícula / ID
        pdf.setFontSize(7);
        pdf.setTextColor(107, 114, 128);
        pdf.text("ID: " + alunoAtual.matricula, 4, currentY);

        // Salvar
        pdf.save(`CARTEIRINHA_${alunoAtual.matricula}.pdf`);
      }, 300);
    });
  </script>
</body>
</html>
