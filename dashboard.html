<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel de Refeições — Coordenação</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .nav-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-radius: 10rem;
      color: #fff !important;
      text-transform: uppercase;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1rem;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      z-index: 1;
      text-decoration: none;
      text-align: center;
      min-width: 110px;
    }
    .nav-button:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1e5aa0;
      z-index: -2;
    }
    .nav-button:before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0%;
      height: 100%;
      background-color: #f9b000;
      transition: all 0.3s;
      z-index: -1;
    }
    .nav-button:hover:before {
      width: 100%;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

  <!-- Cabeçalho -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Painel de Refeições</h1>
        <p class="text-sm text-gray-500" id="dataAtual"></p>
      </div>
      <nav class="flex gap-4">
        <a href="index.html" class="nav-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3"/><path d="M7 12h3"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M12 16v.01"/><path d="M16 16v.01"/><path d="M21 12v.01"/><path d="M12 21v.01"/></svg>
          Leitor QR
        </a>
        <a href="admin.html" class="nav-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="16" x2="22" y1="11" y2="11"/></svg>
          Cadastrar
        </a>
        <a href="listagem.html" class="nav-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
          Listagem
        </a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
    
    <!-- Cards de KPI -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Total de Alunos Matriculados</p>
        <p id="kpiTotalAlunos" class="text-3xl font-bold text-indigo-600 mt-2">--</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Refeições Hoje</p>
        <p id="kpiRefeicoesHoje" class="text-3xl font-bold text-emerald-600 mt-2">--</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Alunos Faltantes Hoje</p>
        <p id="kpiNaoComeram" class="text-3xl font-bold text-orange-500 mt-2">--</p>
      </div>
    </section>

    <!-- Gráfico Semanal -->
    <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
      <h2 class="text-lg font-semibold mb-6">Volume de Refeições (Últimos 5 Dias Letivos)</h2>
      <div class="h-64">
        <canvas id="weeklyChart"></canvas>
      </div>
    </section>

    <!-- Tabelas de Relatório -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- Alunos que Comeram -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-50 bg-emerald-50/50">
          <h3 class="font-semibold text-emerald-800 text-sm uppercase">Alunos que Comeram Hoje</h3>
        </div>
        <div class="overflow-x-auto max-h-96">
          <table class="w-full text-left">
            <thead class="bg-gray-50 text-xs font-semibold text-gray-500 uppercase">
              <tr>
                <th class="px-6 py-3">Nome</th>
                <th class="px-6 py-3">Série</th>
                <th class="px-6 py-3">Hora</th>
              </tr>
            </thead>
            <tbody id="tabelaComeram" class="divide-y divide-gray-100 text-sm">
              <!-- Injetado via JS -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Alunos Faltantes -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-50 bg-red-50/50">
          <h3 class="font-semibold text-red-800 text-sm uppercase">Alunos Faltantes Hoje</h3>
        </div>
        <div class="overflow-x-auto max-h-96">
          <table class="w-full text-left">
            <thead class="bg-gray-50 text-xs font-semibold text-gray-500 uppercase">
              <tr>
                <th class="px-6 py-3">Nome</th>
                <th class="px-6 py-3">Série</th>
                <th class="px-6 py-3">Matrícula</th>
              </tr>
            </thead>
            <tbody id="tabelaFaltantes" class="divide-y divide-gray-100 text-sm text-gray-600">
              <!-- Injetado via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, onSnapshot, orderBy, limit } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB1wMxVNTcvIyz80arV4YNsKhUZAs7a4Uc",
      authDomain: "sistema-merenda.firebaseapp.com",
      projectId: "sistema-merenda",
      storageBucket: "sistema-merenda.firebasestorage.app",
      messagingSenderId: "1051054133501",
      appId: "1:1051054133501:web:83b869d971cc59a403ee94"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('dataAtual').textContent = new Intl.DateTimeFormat('pt-BR', { dateStyle: 'full' }).format(new Date());

    let listaAlunos = [];
    let registrosHoje = [];

    // Monitorização em tempo real dos alunos (Total e nomes)
    onSnapshot(collection(db, "alunos"), (snapshot) => {
      listaAlunos = snapshot.docs.map(doc => doc.data());
      updateDashboardUI();
    });

    // Monitorização em tempo real dos registos de hoje
    const qHoje = query(collection(db, "registros"), where("data", "==", todayStr));
    onSnapshot(qHoje, (snapshot) => {
      // Ordenar por timestamp para mostrar os mais recentes primeiro
      registrosHoje = snapshot.docs.map(doc => doc.data())
        .sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
      updateDashboardUI();
    });

    function updateDashboardUI() {
      if (listaAlunos.length === 0) return;

      // Atualizar KPIs
      const totalAlunos = listaAlunos.length;
      const totalHoje = registrosHoje.length;
      document.getElementById('kpiTotalAlunos').textContent = totalAlunos;
      document.getElementById('kpiRefeicoesHoje').textContent = totalHoje;
      document.getElementById('kpiNaoComeram').textContent = totalAlunos - totalHoje;

      // Popular Tabelas
      renderTables(listaAlunos, registrosHoje);
    }


    function renderTables(alunos, registros) {
      const tabelaComeram = document.getElementById('tabelaComeram');
      const tabelaFaltantes = document.getElementById('tabelaFaltantes');
      
      const matriculasComeram = new Set(registros.map(r => r.matricula));

      // Alunos que comeram
      tabelaComeram.innerHTML = registros.map(reg => {
        const aluno = alunos.find(a => a.matricula === reg.matricula) || { nome: 'Desconhecido', serie: '--' };
        const hora = reg.timestamp?.toDate ? reg.timestamp.toDate().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '--:--';
        return `<tr>
          <td class="px-6 py-4 font-medium text-gray-900">${aluno.nome}</td>
          <td class="px-6 py-4 text-gray-600">${aluno.serie}</td>
          <td class="px-6 py-4 font-mono text-emerald-600">${hora}</td>
        </tr>`;
      }).join('');

      // Alunos faltantes
      const faltantes = alunos.filter(a => !matriculasComeram.has(a.matricula))
        .sort((a, b) => a.nome.localeCompare(b.nome));
      tabelaFaltantes.innerHTML = faltantes.map(a => `
        <tr>
          <td class="px-6 py-4 font-medium">${a.nome}</td>
          <td class="px-6 py-4">${a.serie}</td>
          <td class="px-6 py-4 text-xs font-mono">${a.matricula}</td>
        </tr>
      `).join('');
    }

    async function renderWeeklyChart() {
      const ctx = document.getElementById('weeklyChart').getContext('2d');
      const last5Days = [];
      const labels = [];
      
      for(let i = 4; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const s = d.toISOString().split('T')[0];
        last5Days.push(s);
        labels.push(d.toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit' }));
      }

      const dataPoints = await Promise.all(last5Days.map(async (date) => {
        const q = query(collection(db, "registros"), where("data", "==", date));
        const snap = await getDocs(q);
        return snap.size;
      }));

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Alunos',
            data: dataPoints,
            backgroundColor: '#6366f1',
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1 } },
            x: { grid: { display: false } }
          }
        }
      });
    }

    // O gráfico é carregado uma vez na inicialização
    renderWeeklyChart();
  </script>
</body>
</html>
