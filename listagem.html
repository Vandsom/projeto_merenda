    }
    .nav-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-radius: 10rem;
      color: #fff !important;

      position: relative;
      overflow: hidden;
      z-index: 1;
      text-decoration: none;

    }
    .nav-button:after {
      content: '';

      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {

      authDomain: "sistema-merenda.firebaseapp.com",

    const editTurma = document.getElementById('editTurma');
    const exportarBtn = document.getElementById('exportarBtn');
    const exportarPdfBtn = document.getElementById('exportarPdfBtn');
    const filtroBusca = document.getElementById('filtroBusca');
    const filtroCurso = document.getElementById('filtroCurso');
    const filtroTurma = document.getElementById('filtroTurma');

    const batchPrintBtn = document.getElementById('batchPrintBtn');
    const batchPrintArea = document.getElementById('batchPrintArea');
    const themeToggle = document.getElementById('themeToggle');

    // Função para exibir toasts de notificação
    function showToast(message, type = 'info', duration = 3000) {
      const toastContainer = document.getElementById('toast-container');
      if (!toastContainer) {
        console.error('Toast container not found!');
        return;
      }

      const toast = document.createElement('div');
      toast.className = 'relative flex items-center justify-between w-full max-w-xs p-4 text-gray-900 bg-white rounded-lg shadow dark:text-gray-400 dark:bg-gray-800';

      let icon = '';
      let bgColor = '';
      let textColor = '';

      switch (type) {
        case 'success':
          icon = `<svg class="w-5 h-5 text-green-500 dark:text-green-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/></svg>`;
          bgColor = 'bg-green-100 dark:bg-green-900';
          textColor = 'text-green-800 dark:text-green-300';
          break;
        case 'error':
          icon = `<svg class="w-5 h-5 text-red-500 dark:text-red-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 11.793a1 1 0 1 1-1.414 1.414L10 11.414l-2.293 2.293a1 1 0 0 1-1.414-1.414L8.586 10 6.293 7.707a1 1 0 0 1 1.414-1.414L10 8.586l2.293-2.293a1 1 0 0 1 1.414 1.414L11.414 10l2.293 2.293Z"/></svg>`;
          bgColor = 'bg-red-100 dark:bg-red-900';
          textColor = 'text-red-800 dark:text-red-300';
          break;
        case 'info':
        default:
          icon = `<svg class="w-5 h-5 text-blue-500 dark:text-blue-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM10 15a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm1-4a1 1 0 0 1-2 0V6a1 1 0 0 1 2 0v5Z"/></svg>`;
          bgColor = 'bg-blue-100 dark:bg-blue-900';
          textColor = 'text-blue-800 dark:text-blue-300';
          break;
      }

      toast.innerHTML = `
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 ${bgColor} rounded-lg">
          ${icon}
          <span class="sr-only">${type} icon</span>
        </div>
        <div class="ms-3 text-sm font-normal ${textColor}">${message}</div>
        <button type="button" class="ms-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8 dark:text-gray-500 dark:hover:text-white dark:bg-gray-800 dark:hover:bg-gray-700" data-dismiss-target="#toast-success" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
        </button>
      `;

      toastContainer.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, duration);

      toast.querySelector('button').addEventListener('click', () => {
        toast.remove();
      });
    }

    let alunosCache = [];
    let configCache = { cursosComTurmas: {} };

    // Lógica de Alternar Tema
    themeToggle.addEventListener('click', () => {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    });

    // Carregar Configurações
    async function carregarConfig() {
      const docRef = doc(db, "configuracoes", "dadosBase");
      const snap = await getDoc(docRef);
      if (snap.exists()) {
        const data = snap.data() || {};
        configCache.cursosComTurmas = data.cursosComTurmas || {};
      } else {
        configCache.cursosComTurmas = {};
      }

      const cursos = Object.keys(configCache.cursosComTurmas).sort((a, b) => a.localeCompare(b, 'pt-BR'));
      popularSelect(filtroCurso, cursos, "Todos os Cursos", false);
      atualizarFiltroTurma();
      popularSelect(editCurso, cursos, "", false);
      popularSelect(editTurma, [], "Selecione um curso", true);
      editCurso.addEventListener('change', () => {
        const turmas = configCache.cursosComTurmas[editCurso.value] || [];
        popularSelect(editTurma, turmas, "Selecione uma turma", turmas.length === 0);
      });
    }

    // Proteção de rota e Logout
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error("Erro ao sair:", error);
      }
    });

    function popularSelect(el, items, placeholder, disabled = false) {
      el.innerHTML = placeholder ? `<option value="">${placeholder}</option>` : '';
      (items || []).forEach(i => {
        el.innerHTML += `<option value="${i}">${i}</option>`;
      });
      el.disabled = disabled;
    }
    
    // Carregar Alunos do Firestore
    async function carregarAlunos() {
      try {
        const q = query(collection(db, "alunos"), orderBy("nome", "asc"));
        const snapshot = await getDocs(q);

        alunosCache = snapshot.docs.map(docSnap => ({
          id: docSnap.id,
          ...docSnap.data()
        }));

        filtrarAlunos();
 showToast('Alunos carregados com sucesso!', 'success');
      } catch (error) {
        console.error("Erro ao carregar:", error);
        listaAlunosEl.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-red-500">Erro ao carregar dados.</td></tr>';
 showToast('Erro ao carregar dados dos alunos.', 'error');
      }
    }

    // Função para filtrar e renderizar a tabela
    function filtrarAlunos() {
      const termo = filtroBusca.value.toUpperCase();
      const curso = filtroCurso.value;
      const turma = filtroTurma.value;

      // Botão de impressão em lote só aparece se houver uma turma selecionada
      batchPrintBtn.classList.toggle('hidden', !turma);

      const alunosFiltrados = alunosCache.filter(aluno => {
        const matchTexto = aluno.nome.toUpperCase().includes(termo) || aluno.matricula.includes(termo);
        const matchCurso = curso === "" || aluno.curso === curso;
        const matchTurma = turma === "" || aluno.turma === turma;
        return matchTexto && matchCurso && matchTurma;
      });

      renderizarTabela(alunosFiltrados);
    }

    function renderizarTabela(alunos) {
        if (alunos.length === 0) {
          listaAlunosEl.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-400">Nenhum aluno cadastrado.</td></tr>';
          return;
        }

        listaAlunosEl.innerHTML = '';
        const termo = filtroBusca.value.trim();

        const isDark = document.documentElement.classList.contains('dark');
        const textClass = isDark ? 'text-white' : 'text-gray-900';
        const subTextClass = isDark ? 'text-slate-400' : 'text-gray-600';

        alunos.forEach((aluno) => {
          const id = aluno.id;

          let nomeExibicao = aluno.nome;
          if (termo) {
            const regex = new RegExp(`(${termo.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            nomeExibicao = aluno.nome.replace(regex, '<mark class="bg-yellow-200 rounded-sm">$1</mark>');
          }

          const tr = document.createElement('tr');
          tr.className = 'hover:bg-gray-50 transition';
          tr.innerHTML = `
            <td class="px-6 py-4 font-medium ${textClass}">${nomeExibicao}</td>
            <td class="px-6 py-4 text-sm font-mono ${subTextClass}">${aluno.matricula}</td>
            <td class="px-6 py-4 ${subTextClass}">${aluno.curso || '--'}</td>
            <td class="px-6 py-4 ${subTextClass}">${aluno.turma || '--'}</td>
            <td class="px-6 py-4">
              <button class="btn-status px-2 py-1 rounded text-xs font-bold ${aluno.status === 'ativo' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}" data-id="${id}" data-current="${aluno.status}">
                ${(aluno.status || 'ativo').toUpperCase()}
              </button>
            </td>
            <td class="px-6 py-4 text-right flex justify-end gap-3">
              <button class="btn-qr text-indigo-600 font-medium text-sm" data-nome="${aluno.nome}" data-curso="${aluno.curso}" data-turma="${aluno.turma}" data-mat="${aluno.matricula}">QR</button>
              <button class="btn-edit text-amber-600 font-medium text-sm" data-id="${id}" data-nome="${aluno.nome}" data-curso="${aluno.curso}" data-turma="${aluno.turma}">Editar</button>
              <button class="btn-del text-red-500 hover:text-red-700 font-medium text-sm" data-id="${id}">
                Excluir
              </button>
            </td>
          `;
          listaAlunosEl.appendChild(tr);
        });

        adicionarEventos();
    }

    // Listeners para os filtros
    filtroBusca.addEventListener('input', filtrarAlunos);
    filtroCurso.addEventListener('change', () => {
      atualizarFiltroTurma();
      filtrarAlunos();
    });
    filtroTurma.addEventListener('change', filtrarAlunos);

    function atualizarFiltroTurma() {
      const curso = filtroCurso.value;
      if (!curso) {
        popularSelect(filtroTurma, [], "Todas as Turmas", true);
        return;
      }

      const turmas = configCache.cursosComTurmas[curso] || [];
      popularSelect(filtroTurma, turmas, "Todas as Turmas", turmas.length === 0);
    }

    function adicionarEventos() {
      // Evento de Exclusão
      document.querySelectorAll('.btn-del').forEach(btn => {
        btn.onclick = async (e) => {
          if (confirm("Deseja realmente excluir este aluno? Esta ação não pode ser desfeita.")) {
            const id = e.target.getAttribute('data-id');
            try {
              await deleteDoc(doc(db, "alunos", id));
              carregarAlunos();
 showToast('Aluno excluído com sucesso!', 'success');
            } catch (error) {
 showToast('Erro ao excluir aluno.', 'error');
            }
 showToast('Aluno excluído com sucesso!', 'success');
          }
        };
      });

      // Evento de Status
      document.querySelectorAll('.btn-status').forEach(btn => {
        btn.onclick = async (e) => {
          const id = e.target.getAttribute('data-id');
          const current = e.target.getAttribute('data-current');
          const newStatus = current === 'ativo' ? 'inativo' : 'ativo';
          try {
            await updateDoc(doc(db, "alunos", id), { status: newStatus });
            carregarAlunos();
 showToast('Status do aluno atualizado!', 'success');
          } catch (e) { showToast('Erro ao mudar status.', 'error');
 }
        };
      });

      // Evento de Edição
      document.querySelectorAll('.btn-edit').forEach(btn => {
        btn.onclick = (e) => {
          const id = e.target.getAttribute('data-id');
          const nome = e.target.getAttribute('data-nome');
          const curso = e.target.getAttribute('data-curso');
          const turma = e.target.getAttribute('data-turma');
          abrirEditModal(id, nome, curso, turma);
        };
      });

      // Evento de QR Code
      document.querySelectorAll('.btn-qr').forEach(btn => {
        btn.onclick = (e) => {
          const nome = e.target.getAttribute('data-nome');
          const curso = e.target.getAttribute('data-curso');
          const turma = e.target.getAttribute('data-turma');
          const matricula = e.target.getAttribute('data-mat');
          abrirModal(nome, curso, turma, matricula);
        };
      });
    }

    function abrirModal(nome, curso, turma, matricula) {
      document.getElementById('modalNome').textContent = nome;
      document.getElementById('modalCurso').textContent = curso;
      document.getElementById('modalTurma').textContent = turma;
      document.querySelector('#modalMat span').textContent = matricula;
      
      // Gerar QR Code com qrcode.js
      const container = document.getElementById('modalQRContainer');
      container.innerHTML = "";
      new QRCode(container, {
        text: matricula,
        width: 85,
        colorDark : "#000000",
        height: 85,
        correctLevel: QRCode.CorrectLevel.H
      });
      
      qrModal.classList.remove('opacity-0', 'pointer-events-none');
      document.body.classList.add('modal-active');
    }

    function fecharModal() {
      qrModal.classList.add('opacity-0', 'pointer-events-none');
      document.body.classList.remove('modal-active');
    }

    function abrirEditModal(id, nome, curso, turma) {
      editId.value = id;
      editNome.value = nome;
      editCurso.value = curso || '';
      const turmas = configCache.cursosComTurmas[curso] || [];
      popularSelect(editTurma, turmas, "Selecione uma turma", turmas.length === 0);
      editTurma.value = turma || '';
      
      editModal.classList.remove('opacity-0', 'pointer-events-none');
      document.body.classList.add('modal-active');
    }

    function fecharEditModal() {
      editModal.classList.add('opacity-0', 'pointer-events-none');
      document.body.classList.remove('modal-active');
    }

    closeEditModal.onclick = fecharEditModal;

    formEdit.onsubmit = async (e) => {
      e.preventDefault();
      const id = editId.value;
      const nome = editNome.value.trim().toUpperCase();
      const curso = editCurso.value.toUpperCase();
      const turma = editTurma.value.toUpperCase();
      
      if (!nome || !curso || !turma) return;

      const saveBtn = document.getElementById('saveEditBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = "Salvando...";

      try {
        await updateDoc(doc(db, "alunos", id), { nome, curso, turma });
        fecharEditModal();
 showToast('Alterações salvas com sucesso!', 'success');
        carregarAlunos();
      } catch (error) { console.error("Erro ao atualizar:", error); showToast('Erro ao salvar alterações.', 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Salvar Alterações";
      }
    };

    downloadQRBtn.onclick = () => {
 showToast('Carteirinha PDF gerada e baixada!', 'success');
      const container = document.getElementById('modalQRContainer');
      const canvas = container.querySelector('canvas');
      if (!canvas) return;

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [86, 54] });

      const nome = document.getElementById('modalNome').textContent.trim();
      const curso = document.getElementById('modalCurso').textContent.trim();
      const turma = document.getElementById('modalTurma').textContent.trim();
      const matricula = document.querySelector('#modalMat span').textContent.trim();
      const qrDataUrl = canvas.toDataURL("image/png");

      // Borda opcional
      pdf.setDrawColor(203, 213, 225);
      pdf.setLineWidth(0.1);
      pdf.roundedRect(0, 0, 86, 54, 2, 2);

      // Logo (Margem 4mm)
      pdf.addImage('logo.png', 'PNG', 4, 4, 24, 24);

      // QR Code (Posicionado à direita: 56mm de X para 26mm de largura)
      pdf.addImage(qrDataUrl, 'PNG', 56, 4, 26, 26);

      // Texto com trava de 50mm de largura
      let currentY = 31;
      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(10);
      pdf.setTextColor(0, 0, 0);
      const nomeLines = pdf.splitTextToSize(nome.toUpperCase(), 50);
      pdf.text(nomeLines, 4, currentY);
      currentY += (nomeLines.length * 4);

      pdf.setFontSize(8);
      pdf.setTextColor(67, 56, 202);
      const cursoLines = pdf.splitTextToSize(curso.toUpperCase(), 50);
      pdf.text(cursoLines, 4, currentY);
      currentY += (cursoLines.length * 3);

      pdf.setFont("helvetica", "normal");
      pdf.setTextColor(31, 41, 55);
      pdf.text(turma.toUpperCase(), 4, currentY);
      currentY += 4;

      pdf.setTextColor(107, 114, 128);
      pdf.text("ID: " + matricula, 4, currentY);

      const fileName = `${nome.toUpperCase()} - ${matricula}.pdf`;
      pdf.save(fileName);
    };

    closeModal.onclick = fecharModal;
    window.onclick = (event) => {
      if (event.target == qrModal.querySelector('.modal-overlay')) fecharModal();
      if (event.target == editModal.querySelector('.modal-overlay')) fecharEditModal();
    };

    // --- IMPRESSÃO EM LOTE ---
    batchPrintBtn.onclick = async () => {
      const turmaSel = filtroTurma.value;
      const alunosParaImprimir = alunosCache.filter(a => a.turma === turmaSel && a.status === 'ativo');
      
      if (alunosParaImprimir.length === 0) return showToast("Nenhum aluno ativo nesta turma.", 'info');

      batchPrintArea.innerHTML = "";
      
      for (const aluno of alunosParaImprimir) {
        const card = document.createElement('div');
        card.className = "cracha-cr80";
        card.innerHTML = `
          <div class="w-[50mm] h-full flex flex-col justify-between overflow-hidden text-left">
            <img src="logo.png" class="h-[24mm] w-auto object-contain object-left mb-1">
            <div class="flex flex-col justify-end gap-[2px]">
              <span class="font-bold text-[10px] leading-tight uppercase text-black break-words whitespace-normal line-clamp-2">${aluno.nome}</span>
              <span class="text-[8px] font-bold leading-tight uppercase text-indigo-700 break-words whitespace-normal line-clamp-2">${aluno.curso}</span>
              <span class="text-[8px] leading-tight uppercase text-gray-800">${aluno.turma}</span>
              <span class="text-[8px] leading-tight uppercase text-gray-500 mt-1">ID: ${aluno.matricula}</span>
            </div>
          </div>
          <div class="w-[26mm] h-[26mm] flex-shrink-0 flex items-start justify-center">
            <div id="batch-qr-${aluno.matricula}" class="w-[26mm] h-[26mm]"></div>
          </div>
        `;
        batchPrintArea.appendChild(card);

        new QRCode(document.getElementById(`batch-qr-${aluno.matricula}`), {
          text: aluno.matricula,
          width: 85,
          height: 85
 , colorDark : "#000000"
        });
      }

      setTimeout(() => {
        window.print();
        batchPrintArea.innerHTML = "";
      }, 500);
    };

    // Exportar lista filtrada para PDF
    exportarPdfBtn.onclick = () => {
      const curso = filtroCurso.value || "Todos os Cursos";
      const turma = filtroTurma.value || "Todas as Turmas";
      
      const termo = filtroBusca.value.toUpperCase();
      const alunosFiltrados = alunosCache.filter(aluno => {
        const matchTexto = aluno.nome.toUpperCase().includes(termo) || aluno.matricula.includes(termo);
        const matchCurso = filtroCurso.value === "" || aluno.curso === filtroCurso.value;
        const matchTurma = filtroTurma.value === "" || aluno.turma === filtroTurma.value;
        return matchTexto && matchCurso && matchTurma;
      });

      if (alunosFiltrados.length === 0) return showToast("Nenhum dado para exportar.", "info");

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(16);
      doc.text("CETIPass - Listagem de Alunos", 14, 20);
      doc.setFontSize(10);
      doc.text(`Filtro: ${curso} / ${turma}`, 14, 28);

      const body = alunosFiltrados.map(a => [a.nome, a.matricula, a.curso, a.turma, a.status.toUpperCase()]);

      doc.autoTable({
        startY: 35,
        head: [['Nome', 'Matrícula', 'Curso', 'Turma', 'Status']],
        body: body,
        theme: 'striped',
        headStyles: { fillColor: [79, 70, 229] },
        styles: { fontSize: 8 }
      });

      const date = new Date().toISOString().split('T')[0];
      doc.save(`LISTA_ALUNOS_${curso}_${turma}_${date}.pdf`);
      showToast("PDF gerado com sucesso!", "success");
    };

    // Função para exportar a lista para CSV (compatível com Excel)
    async function exportarCSV() {
      try {
        const q = query(collection(db, "alunos"), orderBy("nome", "asc"));
        const snapshot = await getDocs(q);
        
        if (snapshot.empty) {
 showToast("Não há alunos para exportar.", 'info');
          return;
        }

        let csv = "\uFEFFNome,Curso,Turma,Matrícula,Status\n";
        snapshot.forEach((docSnap) => {
          const aluno = docSnap.data();
          csv += `"${aluno.nome}","${aluno.curso}","${aluno.turma}","${aluno.matricula}","${aluno.status}"\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "lista_alunos_cetipass.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
 showToast('Dados exportados para CSV com sucesso!', 'success');
      } catch (error) { console.error("Erro ao exportar:", error); showToast('Erro ao exportar dados.', 'error');
 }
    }

    exportarBtn.onclick = exportarCSV;

    // Inicializar
    carregarConfig();
    carregarAlunos();
  </script>
  <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-2"></div>
</body>
</html>
